    <!-- GitHub Pages SPA: restore path encoded by 404.html -->

        var r = sessionStorage.getItem('spa-redirect');
        if (r) { sessionStorage.removeItem('spa-redirect'); window.history.replaceState(null,null,r); }

    </script>
